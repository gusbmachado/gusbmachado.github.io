<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F1419">
  <title>Gustavo Barcelos Machado | Mobile &amp; Frontend Engineer</title>
  <meta name="description" content="Engenheiro de Software com 5 anos de experiência em Flutter, React e TypeScript. Especialista em IoT, Streaming de Vídeo e Arquiteturas Offline-First.">
  <meta name="keywords" content="Flutter Developer, React Developer, TypeScript, Mobile, Frontend, IoT, Uberlândia, Software Engineer">
  <meta name="author" content="Gustavo Barcelos Machado">
  <meta property="og:title" content="Gustavo Barcelos Machado | Mobile &amp; Frontend Engineer">
  <meta property="og:description" content="Engenheiro de Software com 5 anos em Flutter, React e IoT">
  <meta property="og:type" content="website">
  <meta property="og:image" content="./assets/img/icon.png">
  <link rel="icon" href="./assets/img/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<!-- ═══════════════════ HEADER ═══════════════════ -->
<header class="header" id="header">
  <nav class="nav" aria-label="Main navigation">
    <a href="#home" class="nav__logo">
      <img src="./assets/img/logo.png" alt="GBM.dev" loading="eager" width="34" height="34">
    </a>

    <div class="nav__menu">
      <ul class="nav__list" role="list">
        <li><a href="#home"       class="nav__link active-link"><i class="bx bx-home-alt"></i><span data-i18n="nav.home"></span></a></li>
        <li><a href="#about"      class="nav__link"><i class="bx bx-user"></i><span data-i18n="nav.about"></span></a></li>
        <li><a href="#experience" class="nav__link"><i class="bx bx-briefcase"></i><span data-i18n="nav.experience"></span></a></li>
        <li><a href="#work"       class="nav__link"><i class="bx bx-briefcase-alt-2"></i><span data-i18n="nav.work"></span></a></li>
        <li><a href="#documents"  class="nav__link"><i class="bx bx-file"></i><span data-i18n="nav.documents"></span></a></li>
        <li><a href="#contact"    class="nav__link"><i class="bx bx-message-square-detail"></i><span data-i18n="nav.contact"></span></a></li>
      </ul>
    </div>

    <div class="nav__controls">
      <div class="lang-selector" role="group" aria-label="Language selector">
        <span class="lang-option" data-lang="pt-BR" role="button" tabindex="0">PT</span>
        <span class="lang-option" data-lang="en"    role="button" tabindex="0">EN</span>
        <span class="lang-option" data-lang="es"    role="button" tabindex="0">ES</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" aria-pressed="false">
        <i class="bx bx-moon"></i>
      </button>
    </div>
  </nav>
</header>

<main class="main">

<!-- ═══════════════════ 1. HERO ═══════════════════ -->
<section class="home section" id="home">
  <!-- Canvas particle network background -->
  <canvas id="hero-canvas" aria-hidden="true"></canvas>

  <div class="home__container container">
    <div class="home__data">
      <span class="home__greeting" data-i18n="hero.greeting"></span>
      <h1 class="home__name">Gustavo <span class="highlight">Barcelos</span> Machado</h1>
      <h2 class="home__title" data-i18n-html="hero.title"></h2>

      <p class="home__description" data-i18n-html="hero.description"></p>

      <div class="home__stats">
        <div class="stat-item">
          <span class="stat-number" data-count="5" data-suffix="+">5+</span>
          <span class="stat-label" data-i18n="hero.stat_years_label"></span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-count="18" data-suffix="+">18+</span>
          <span class="stat-label" data-i18n="hero.stat_projects_label"></span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-count="3">3</span>
          <span class="stat-label" data-i18n="hero.stat_langs_label"></span>
        </div>
      </div>

      <div class="home__buttons">
        <a href="./assets/pdf/gustavo-b-machado.pdf" download class="button button--primary">
          <i class="bx bxs-download"></i>
          <span data-i18n="hero.cta_primary"></span>
        </a>
        <a href="#contact" class="button button--ghost">
          <span data-i18n="hero.cta_secondary"></span>
        </a>
      </div>

      <div class="home__social">
        <a href="https://www.linkedin.com/in/gustavo-machado-40a250186" target="_blank" rel="noopener" class="home__social-link" aria-label="LinkedIn"><i class="bx bxl-linkedin"></i></a>
        <a href="https://github.com/gusbmachado"                         target="_blank" rel="noopener" class="home__social-link" aria-label="GitHub"><i class="bx bxl-github"></i></a>
        <a href="mailto:gustavobmachado105@gmail.com"                    class="home__social-link" aria-label="E-mail"><i class="bx bx-envelope"></i></a>
        <a href="https://wa.me/5534991958314"                            target="_blank" rel="noopener" class="home__social-link" aria-label="WhatsApp"><i class="bx bxl-whatsapp"></i></a>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════ 2. ABOUT ═══════════════════ -->
<section class="about section alt" id="about">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="about.subtitle"></span>
      <h2 class="section-title"      data-i18n="about.title"></h2>
    </div>

    <div class="about__container">
      <div class="about__info">
        <div class="about__box fade-in">
          <i class="bx bx-briefcase about__icon"></i>
          <h3 class="about__title">~5</h3>
          <span class="about__subtitle" data-i18n="about.box_exp"></span>
        </div>
        <div class="about__box fade-in">
          <i class="bx bx-code-block about__icon"></i>
          <h3 class="about__title">18+</h3>
          <span class="about__subtitle" data-i18n="about.box_projects"></span>
        </div>
        <div class="about__box fade-in">
          <i class="bx bxs-graduation about__icon"></i>
          <h3 class="about__title" data-i18n="about.box_degree"></h3>
          <span class="about__subtitle" data-i18n="about.box_degree_sub"></span>
        </div>
        <div class="about__box fade-in">
          <i class="bx bx-world about__icon"></i>
          <h3 class="about__title">3</h3>
          <span class="about__subtitle" data-i18n="about.box_langs"></span>
        </div>
      </div>

      <div class="about__data fade-in">
        <p class="about__description" data-i18n-html="about.description"></p>
        <a href="#contact" class="button button--primary">
          <span data-i18n="about.cta"></span>
          <i class="bx bx-right-arrow-alt"></i>
        </a>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════ 3. EXPERIENCE ═══════════════════ -->
<section class="experience section" id="experience">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="experience.subtitle"></span>
      <h2 class="section-title"      data-i18n="experience.title"></h2>
    </div>
    <!-- Rendered by render.js from portfolio.json -->
    <div class="timeline"></div>
  </div>
</section>

<!-- ═══════════════════ 4. WORK ═══════════════════ -->
<section class="work section alt" id="work">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="work.subtitle"></span>
      <h2 class="section-title"      data-i18n="work.title"></h2>
    </div>

    <div class="work__filters" role="group" aria-label="Filter projects">
      <span class="work__item active-work" data-filter="all">
        <span data-i18n="work.filter_all"></span>
      </span>
      <span class="work__item" data-filter="mobile">Mobile</span>
      <span class="work__item" data-filter="web">Web</span>
      <span class="work__item" data-filter="iot">IoT</span>
    </div>

    <!-- Rendered by render.js -->
    <div class="work__container"></div>

    <!-- Currently Building strip -->
    <div class="building__strip">
      <div class="building__strip-header">
        <span class="building__pulse-dot"></span>
        <h3 class="building__strip-title" data-i18n="work.building_title"></h3>
        <span class="building__strip-sub"  data-i18n="work.building_subtitle"></span>
      </div>
      <!-- Rendered by render.js -->
      <div class="building__grid" id="building-list"></div>
    </div>
  </div>
</section>

<!-- ═══════════════════ 5. DOCUMENTS ═══════════════════ -->
<section class="documents section" id="documents">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="documents.subtitle"></span>
      <h2 class="section-title"      data-i18n="documents.title"></h2>
    </div>
    <!-- Rendered by render.js -->
    <div class="documents__grid"></div>
  </div>
</section>

<!-- ═══════════════════ 6. CONTACT ═══════════════════ -->
<section class="contact section alt" id="contact">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle" data-i18n="contact.subtitle"></span>
      <h2 class="section-title"      data-i18n="contact.title"></h2>
      <p class="section-description" data-i18n="contact.description"></p>
    </div>

    <div class="contact__layout">

      <!-- Contact form -->
      <form class="contact__form fade-in" id="contactForm" novalidate>
        <div class="contact__form-row">
          <div class="contact__form-group">
            <label class="contact__form-label" for="contactName" data-i18n="contact.form_name"></label>
            <input class="contact__form-input" type="text" id="contactName" name="name"
                   autocomplete="name" required
                   data-i18n-placeholder="contact.form_name_ph">
          </div>
          <div class="contact__form-group">
            <label class="contact__form-label" for="contactEmail" data-i18n="contact.form_email"></label>
            <input class="contact__form-input" type="email" id="contactEmail" name="email"
                   autocomplete="email" required
                   data-i18n-placeholder="contact.form_email_ph">
          </div>
        </div>
        <div class="contact__form-group">
          <label class="contact__form-label" for="contactSubject" data-i18n="contact.form_subject"></label>
          <input class="contact__form-input" type="text" id="contactSubject" name="subject"
                 data-i18n-placeholder="contact.form_subject_ph">
        </div>
        <div class="contact__form-group">
          <label class="contact__form-label" for="contactMessage" data-i18n="contact.form_message"></label>
          <textarea class="contact__form-input contact__form-textarea"
                    id="contactMessage" name="message" rows="5" required
                    data-i18n-placeholder="contact.form_message_ph"></textarea>
        </div>
        <button class="button button--primary contact__form-btn" type="submit">
          <i class="bx bxs-send"></i>
          <span data-i18n="contact.form_send"></span>
        </button>
        <p class="contact__form-feedback" id="contactFeedback" aria-live="polite"></p>
        <!-- Quick direct links -->
        <div class="contact__quick-links">
          <a href="mailto:gustavobmachado105@gmail.com" class="contact__quick-link" aria-label="Email"><i class="bx bx-envelope"></i></a>
          <a href="https://wa.me/5534991958314" target="_blank" rel="noopener" class="contact__quick-link" aria-label="WhatsApp"><i class="bx bxl-whatsapp"></i></a>
          <a href="https://www.linkedin.com/in/gustavo-machado-40a250186" target="_blank" rel="noopener" class="contact__quick-link" aria-label="LinkedIn"><i class="bx bxl-linkedin"></i></a>
          <a href="https://github.com/gusbmachado" target="_blank" rel="noopener" class="contact__quick-link" aria-label="GitHub"><i class="bx bxl-github"></i></a>
        </div>
      </form>

      <!-- Compensation panel -->
      <div class="compensation__panel fade-in">
        <h3 class="compensation__panel-title" data-i18n="contact.comp_subtitle"></h3>
        <div class="compensation__items">
          <div class="compensation__item">
            <span class="compensation__item-label" data-i18n="contact.comp_hourly_label"></span>
            <span class="compensation__item-value">R$ 40/h</span>
            <span class="compensation__item-note"  data-i18n="contact.comp_hourly_note"></span>
          </div>
          <div class="compensation__item">
            <span class="compensation__item-label" data-i18n="contact.comp_clt_label"></span>
            <span class="compensation__item-value">R$ 5k–7k</span>
            <span class="compensation__item-note"  data-i18n="contact.comp_clt_note"></span>
          </div>
          <div class="compensation__item">
            <span class="compensation__item-label" data-i18n="contact.comp_intl_label"></span>
            <span class="compensation__item-value">US$ 15/h</span>
            <span class="compensation__item-note"  data-i18n="contact.comp_intl_note"></span>
          </div>
        </div>
        <p class="compensation__flex-note" data-i18n="contact.flexible_note"></p>
      </div>

    </div>
  </div>
</section>

</main>

<!-- ═══════════════════ FOOTER ═══════════════════ -->
<footer class="footer">
  <div class="container">
    <p class="footer__copy">
      &copy; 2025 Gustavo Barcelos Machado
    </p>
  </div>
</footer>

<!-- ═══════════════════ MOBILE NAV ═══════════════════ -->
<nav class="mnav" aria-label="Quick navigation">
  <a href="#home"       class="mnav__link" aria-label="Home"><i class="bx bx-home-alt"></i></a>
  <a href="#about"      class="mnav__link" aria-label="About"><i class="bx bx-user"></i></a>
  <a href="#experience" class="mnav__link" aria-label="Experience"><i class="bx bx-briefcase"></i></a>
  <a href="#work"       class="mnav__link" aria-label="Work"><i class="bx bx-briefcase-alt-2"></i></a>
  <a href="#documents"  class="mnav__link" aria-label="Documents"><i class="bx bx-file"></i></a>
  <a href="#contact"    class="mnav__link" aria-label="Contact"><i class="bx bx-message-square-detail"></i></a>
</nav>

<!-- ═══════════════════ PDF MODAL ═══════════════════ -->
<div class="pdf-modal" id="pdfModal" aria-hidden="true" role="dialog"
     aria-modal="true" aria-labelledby="pdfModalTitle">
  <div class="pdf-modal__panel" role="document">
    <div class="pdf-modal__header">
      <span class="pdf-modal__title" id="pdfModalTitle">PDF</span>
      <div class="pdf-modal__actions">
        <a class="pdf-modal__btn" id="pdfDownload" href="#" download>
          <i class="bx bxs-download"></i>
          <span data-i18n="general.download"></span>
        </a>
        <button class="pdf-modal__btn pdf-modal__btn--close" id="pdfClose"
                type="button" aria-label="Close">
          <i class="bx bx-x"></i>
          <span data-i18n="general.close"></span>
        </button>
      </div>
    </div>
    <iframe class="pdf-modal__frame" id="pdfFrame" title="PDF Viewer" loading="lazy"></iframe>
  </div>
</div>

<!-- ═══════════════════ SCROLL UP ═══════════════════ -->
<button class="scrollup" id="scroll-up" aria-label="Scroll to top">
  <i class="bx bx-up-arrow-alt"></i>
</button>

<!-- ES Module entry point (deferred by default for module scripts) -->
<script type="module" src="./assets/js/main.js"></script>
</body>
</html>
